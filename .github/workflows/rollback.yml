name: Roll back portfolio Pages artifact

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Run ID of a known-good successful portfolio-dist artifact
        required: true
        type: string
      confirmation:
        description: Type ROLLBACK followed by a space and the run ID
        required: true
        type: string

permissions:
  actions: read
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  validate_source:
    name: Validate rollback source
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      head_sha: ${{ steps.validate.outputs.head_sha }}
    steps:
      - name: Require a successful trusted deployment run
        id: validate
        uses: actions/github-script@v7
        env:
          REQUESTED_RUN_ID: ${{ inputs.run_id }}
          ROLLBACK_CONFIRMATION: ${{ inputs.confirmation }}
        with:
          script: |
            const rawRunId = process.env.REQUESTED_RUN_ID ?? "";
            if (!/^\d+$/.test(rawRunId)) {
              core.setFailed("run_id must contain decimal digits only.");
              return;
            }

            if (process.env.ROLLBACK_CONFIRMATION !== `ROLLBACK ${rawRunId}`) {
              core.setFailed(`Confirmation must be exactly: ROLLBACK ${rawRunId}`);
              return;
            }

            const runId = Number(rawRunId);
            const { data: run } = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: runId,
            });

            const trustedWorkflow = run.path === ".github/workflows/deploy.yml";
            const trustedRef = run.head_branch === "main" || run.head_branch?.startsWith("portfolio-v3-candidate-");
            if (!trustedWorkflow || !trustedRef || run.conclusion !== "success") {
              core.setFailed("Rollback source must be a successful main or candidate-tag run of .github/workflows/deploy.yml.");
              return;
            }

            core.setOutput("head_sha", run.head_sha);
            core.summary
              .addHeading("Validated rollback source")
              .addRaw(`Run ${rawRunId}, commit ${run.head_sha}`)
              .write();

  deploy:
    name: Redeploy and verify the selected artifact
    needs: validate_source
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: portfolio-pages-production
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the artifact's source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate_source.outputs.head_sha }}
          persist-credentials: false

      - name: Download the selected immutable artifact
        uses: actions/download-artifact@v4
        with:
          name: portfolio-dist
          path: dist
          repository: ${{ github.repository }}
          run-id: ${{ inputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify artifact identity and checksums
        env:
          EXPECTED_RUN_ID: ${{ inputs.run_id }}
          EXPECTED_SHA: ${{ needs.validate_source.outputs.head_sha }}
        run: |
          node --input-type=module -e "import { readFileSync } from 'node:fs'; const release = JSON.parse(readFileSync('dist/release.json', 'utf8')); if (release.runId !== process.env.EXPECTED_RUN_ID || release.commit !== process.env.EXPECTED_SHA || release.deployEligible !== true) { throw new Error('Artifact release metadata does not match the trusted source run.'); }"
          cd dist
          sha256sum --check SHA256SUMS

      - name: Read the GitHub Pages configuration
        uses: actions/configure-pages@v5

      - name: Package the rollback Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Deploy the selected immutable artifact
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke-test the restored production release
        run: pnpm exec playwright test tests/e2e/production.spec.ts --project=chromium
        env:
          BASE_URL: https://appleweiping.github.io
          PRODUCTION_BASE_URL: https://appleweiping.github.io
          PRODUCTION_SMOKE: "1"
          EXPECTED_RELEASE_SHA: ${{ needs.validate_source.outputs.head_sha }}
          EXPECTED_RELEASE_RUN_ID: ${{ inputs.run_id }}

      - name: Preserve rollback smoke diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-smoke-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 30

      - name: Record the restored release
        if: success()
        run: |
          echo "## Production rollback complete" >> "$GITHUB_STEP_SUMMARY"
          echo "Restored artifact from run ${{ inputs.run_id }} at commit ${{ needs.validate_source.outputs.head_sha }}." >> "$GITHUB_STEP_SUMMARY"
